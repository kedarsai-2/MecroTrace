# Local Jenkins + SonarQube for MercoTrace CI.
#
#   cd jenkins && docker compose up -d
#   open http://localhost:8080  (Jenkins)
#   open http://localhost:9001  (SonarQube — default login admin / admin)
#
# Create a SonarQube token (My Account → Security → Tokens), then add Jenkins credential
# id `sonar-token` (Secret text). Run pipeline with RUN_SONAR enabled.

services:
  jenkins:
    build: .
    image: mercotrace-jenkins:lts
    container_name: mercotrace-jenkins
    restart: unless-stopped
    user: root
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sonarqube:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
      SONAR_HOST_URL: "http://sonarqube:9000"
      # Integration tests use compose DB/Redis instead of Testcontainers (see CiComposeDb.java)
      CI_USE_COMPOSE_DB: "true"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/mercotrace"
      SPRING_DATASOURCE_USERNAME: "mercotrace"
      SPRING_DATASOURCE_PASSWORD: "mercotrace"
      JHIPSTER_CACHE_REDIS_SERVER: "redis://redis:6379"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/var/mercotrace-src:ro
    networks:
      - mercotrace-ci
    group_add:
      - "${DOCKER_GID:-999}"

  postgres:
    image: postgres:17.4
    container_name: mercotrace-postgres-ci
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercotrace
      POSTGRES_USER: mercotrace
      POSTGRES_PASSWORD: mercotrace
    networks:
      - mercotrace-ci
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercotrace -d mercotrace"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:8.0.0
    container_name: mercotrace-redis-ci
    restart: unless-stopped
    networks:
      - mercotrace-ci
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  sonarqube:
    image: sonarqube:25.5.0.107428-community
    container_name: mercotrace-sonarqube
    restart: unless-stopped
    environment:
      SONAR_FORCEAUTHENTICATION: "false"
    ports:
      - "127.0.0.1:9001:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - mercotrace-ci
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/api/system/status | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

networks:
  mercotrace-ci:
    name: mercotrace-ci

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
