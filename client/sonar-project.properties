sonar.projectKey=mercotrace-client
sonar.projectName=MercoTrace Client

sonar.sources=src
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/dist/**,android/**,ios/**,cypress/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.typescript.tsconfigPaths=tsconfig.app.json,tsconfig.json
# Coverage optional — enable when running tests with lcov output:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
